# VPC Music — DigitalOcean App Platform (Staging)
#
# Setup:
#   1. Install doctl: https://docs.digitalocean.com/reference/doctl/how-to/install/
#   2. doctl auth init
#   3. Create the app:
#        doctl apps create --spec .do/app.stg.yaml
#   4. Or update existing:
#        doctl apps update <app-id> --spec .do/app.stg.yaml
#
# CI auto-deploys staging on push to the develop branch.

name: stg-vpc-music-api
region: nyc

databases:
  - engine: PG
    name: vpc-music-stg
    num_nodes: 1
    size: db-s-dev-database
    version: "16"
    production: false

services:
  - name: stg-vpc-music-api

    # Pre-built image from DigitalOcean Container Registry
    image:
      registry_type: DOCR
      repository: vpc-music-api
      tag: staging

    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 3001

    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 15
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 3

    routes:
      - path: /

    envs:
      - key: NODE_ENV
        value: staging
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${vpc-music-stg.DATABASE_URL}
      - key: JWT_SECRET
        type: SECRET
        value: REPLACE_ME
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: CORS_ORIGIN
        value: https://stg-app.vpcmusic.life
      - key: FRONTEND_URL
        value: https://stg-app.vpcmusic.life

domains:
  - domain: stg-api.vpcmusic.life
    type: PRIMARY
