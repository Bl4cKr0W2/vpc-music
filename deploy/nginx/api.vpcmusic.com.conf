# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

# Upstream
upstream vpc_music_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.vpcmusic.life;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name api.vpcmusic.life;

    # SSL — managed by Certbot (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.vpcmusic.life/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vpcmusic.life/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 256;

    # Rate & connection limits
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn api_conn 20;

    # Health check — no rate limit
    location /health {
        limit_req off;
        proxy_pass http://vpc_music_api;
    }

    # WebSocket — Socket.io
    location /socket.io/ {
        proxy_pass http://vpc_music_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API proxy
    location / {
        proxy_pass http://vpc_music_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
